    <script>
        AOS.init({
            once: false,
            mirror: true,
            duration: 800,
        });
    </script>
    <script>
        // Custom cursor
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorFollower.style.left = e.clientX + 'px';
            cursorFollower.style.top = e.clientY + 'px';
        });
        
        document.querySelectorAll('a, button, .contact-btn, .social-icon').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(2)';
                cursorFollower.style.transform = 'scale(1.5)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursorFollower.style.transform = 'scale(1)';
            });
        });
        
        // Typed text animation
        const texts = ['爨歩･・､ｨ爭財､ｦ爭財､ｰ爭爨ｯ 爨ｸ爨ｮ爨ｿ爨､爨ｿ 爨ｸ爨ｦ爨ｸ爭財､ｯ', '爨ｯ爭≒､ｵ爨ｾ 爨ｨ爭・､､爨ｾ', '爨ｸ爨ｮ爨ｾ爨憫､ｵ爨ｾ爨ｦ爭 爨・､ｭ爨ｿ爨ｯ爨ｨ爭財､､爨ｾ', '爨ｪ爭≒､ｸ爭財､､爨ｾ爨ｨ爭財､､爨ｰ爨｣爨歩､ｾ 爨ｪ爨歩･財､ｷ爨ｧ爨ｰ'];
        let index = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typedTextElement = document.querySelector('.typed-text');
        
        function typeEffect() {
            const currentText = texts[index];
            if (isDeleting) {
                typedTextElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typedTextElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }
            
            if (!isDeleting && charIndex === currentText.length) {
                isDeleting = true;
                setTimeout(typeEffect, 2000);
                return;
            }
            
            if (isDeleting && charIndex === 0) {
                isDeleting = false;
                index = (index + 1) % texts.length;
                setTimeout(typeEffect, 500);
                return;
            }
            
            setTimeout(typeEffect, isDeleting ? 100 : 150);
        }
        
        typeEffect();
        
        // Scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);
        
        document.querySelectorAll('.card, .hero').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            el.style.transition = 'all 0.8s ease';
            observer.observe(el);
        });
    </script>
